<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Danh Bạ Điện Thoại - Trạm Y tế phường Minh Phụng</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.datatables.net/1.13.6/css/dataTables.bootstrap5.min.css" rel="stylesheet">
    <link href="https://cdn.datatables.net/responsive/2.5.0/css/responsive.bootstrap5.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f4f6f9;
        }

        .container {
            margin-top: 40px;
            margin-bottom: 40px;
            background: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        h2 {
            margin-bottom: 30px;
            color: #2c3e50;
            font-weight: bold;
        }

        .table-responsive {
            overflow-x: auto;
        }

        /* Style cho Header Bảng */
        table.dataTable thead th {
            background-color: #0d6efd;
            color: white;
            white-space: nowrap;
            text-align: center;
        }

        /* Style căn giữa cho cột STT và Điện thoại */
        table.dataTable tbody td:nth-child(1),
        table.dataTable tbody td:nth-child(6) {
            text-align: center;
        }

        @media (max-width: 768px) {
            .container {
                padding: 15px;
                margin-top: 20px;
                margin-bottom: 20px;
            }

            h2 {
                font-size: 1.5rem;
            }

            table.dataTable thead th {
                white-space: normal;
            }
        }
    </style>
</head>

<body>

    <div class="container">
        <h2 class="text-center">📞 DANH BẠ ĐIỆN THOẠI</h2>
        <div id="loading" class="text-center my-5">
            <div class="spinner-border text-primary" style="width: 3rem; height: 3rem;" role="status">
                <span class="visually-hidden">Đang tải...</span>
            </div>
            <h5 class="mt-3 text-secondary">Đang kết nối và tải dữ liệu...</h5>
        </div>
        <div id="table-container" style="display: none; width: 100%;">
            <table id="dataTable" class="table table-hover table-striped table-bordered nowrap" style="width:100%">
                <thead>
                    <tr>
                        <th width="5%">STT</th>
                        <th width="20%">Họ và tên</th>
                        <th width="15%">Chức vụ</th>
                        <th width="15%">Chức danh</th>
                        <th width="15%">Khoa, Phòng, Điểm Y tế</th>
                        <th width="10%">Điện thoại</th>
                        <th width="20%">Email</th>
                    </tr>
                </thead>
                <tbody>
                </tbody>
            </table>
        </div>
    </div>
    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/dataTables.bootstrap5.min.js"></script>
    <script src="https://cdn.datatables.net/responsive/2.5.0/js/dataTables.responsive.min.js"></script>
    <script src="https://cdn.datatables.net/responsive/2.5.0/js/responsive.bootstrap5.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <script>
        $(document).ready(function () {
            const sheetId = '1oX6BLh2sFoo5P6ObBj1GAbJBbDLKnmFlijbB7zdcp-0';
            const gid = '1276602500';
            const csvUrl = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:csv&gid=${gid}`;
            Papa.parse(csvUrl, {
                download: true,
                header: true,
                skipEmptyLines: true,
                complete: function (results) {
                    $('#dataTable').DataTable({
                        data: results.data,
                        columns: [
                            { data: 'Stt', defaultContent: '' },
                            { data: 'Họ và tên', defaultContent: '' },
                            { data: 'Chức vụ', defaultContent: '' },
                            { data: 'Chức danh', defaultContent: '' },
                            { data: 'Khoa, Phòng, Điểm Y tế', defaultContent: '' },
                            {
                                data: 'Điện thoại',
                                defaultContent: '',
                                render: function (data, type, row) {
                                    if (type === 'display' && data) {
                                        let phoneNumber = data.replace(/[\s\.\-\,]/g, '');
                                        return `<a href="tel:${phoneNumber}" style="text-decoration: none; font-weight: 500;"><i class="bi bi-telephone-fill text-success me-1"></i>${data}</a>`;
                                    }
                                    return data;
                                }
                            },
                            { data: 'Email', defaultContent: '' }
                        ],
                        language: {
                            url: '//cdn.datatables.net/plug-ins/1.13.6/i18n/vi.json',
                        },
                        pageLength: 10,
                        lengthMenu: [[10, 25, 50, -1], [10, 25, 50, "Tất cả"]],
                        ordering: true,
                        info: true,
                        autoWidth: false,
                        responsive: true
                    });
                    $('#loading').hide();
                    $('#table-container').fadeIn();
                },
                error: function (err) {
                    $('#loading').html(`
                    <div class="alert alert-danger" role="alert">
                        <h4 class="alert-heading">Đã xảy ra lỗi!</h4>
                        <p>Không thể tải dữ liệu. Vui lòng kiểm tra lại liên kết.</p>
                        <hr>
                        <p class="mb-0"><strong>Lưu ý:</strong> phải được set quyền <b>"Bất kỳ ai có liên kết đều có thể xem" (Anyone with the link can view)</b>.</p>
                    </div>
                `);
                    console.error("Lỗi phân tích lỗi: ", err);
                }
            });
        });
    </script>

</body>

</html>
